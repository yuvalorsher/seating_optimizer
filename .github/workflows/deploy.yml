name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Python package and data into web/python/
        run: |
          mkdir -p web/python/seating_optimizer web/python/data
          cp seating_optimizer/*.py web/python/seating_optimizer/
          cp data/office_map.csv web/python/data/
          # Copy cold_seats if it exists
          [ -f data/cold_seats.csv ] && cp data/cold_seats.csv web/python/data/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
